services:
  web:
    build: .
    image: vatcomply
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
      - SKIP_MIGRATIONS=true
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  cron:
    image: vatcomply
    command: sh -c "env > /app/.env.docker && cron -f"
    user: root  # cron daemon requires root
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    image: vatcomply
    command: sh -c "python manage.py migrate && python manage.py load_countries && python manage.py load_rates --last-90-days && python manage.py load_vat_rates && python manage.py load_rates"
    user: root  # needs write access to create db in shared volume
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    volumes:
      - db-data:/app/data

volumes:
  db-data:
