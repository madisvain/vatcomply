{% extends "base.html" %}

{% block extrahead %}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.meta.description or config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.meta.description or config.site_description }}">
{% endblock %}

{% block header %}
  {{ super() }}
  <script>
    (function() {
      var container = document.createElement("div");
      container.className = "md-header__source";
      var a = document.createElement("a");
      a.href = "https://status.vatcomply.com/";
      a.target = "_blank";
      a.rel = "noopener";
      a.title = "System Status";
      a.className = "md-source";
      a.innerHTML =
        '<div class="md-source__icon md-icon">' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' +
        '</div>' +
        '<div class="md-source__repository">Status</div>';
      container.appendChild(a);
      var source = document.querySelector(".md-header__source");
      if (source) {
        source.parentNode.insertBefore(container, source);
      }
    })();
  </script>
{% endblock %}
